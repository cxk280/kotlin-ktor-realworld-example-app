name: Claude — address Codex review

# Two responsibilities:
#  1. When a PR opens, ask Codex to review it (Codex's own automatic reviews aren't
#     firing on this repo, so we request one explicitly with an `@codex review` comment).
#  2. When a review is submitted, have Claude fix the code, push, and request a
#     re-review — looping until Codex is satisfied or the 3-round cap is hit.
on:
  pull_request:
    types: [opened, reopened]
  pull_request_review:
    types: [submitted]

# If a newer review lands while Claude is still working, cancel the stale run.
concurrency:
  group: claude-codex-loop-${{ github.event.pull_request.number }}
  # Queue overlapping runs instead of cancelling — cancelling mid-run would kill
  # Claude while it is editing files and lose the work.
  cancel-in-progress: false

permissions:
  contents: write        # commit & push fixes to the PR branch
  pull-requests: write   # comment on the PR
  issues: write
  id-token: write        # required: claude-code-action mints its GitHub token via OIDC

jobs:
  # ── Bootstrap: kick off the first Codex review when the PR opens ──────────────
  request-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Ask Codex to review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: gh pr comment "$PR" --repo "${{ github.repository }}" --body "@codex review"

  # ── Loop: address a submitted review, push a fix, ask for a re-review ─────────
  address-review:
    # Only act on real review events (never on Claude's own activity), and only on
    # reviews that say something (changes requested / commented — not a bare approval).
    if: >
      github.event_name == 'pull_request_review' &&
      github.event.review.user.login != 'claude[bot]' &&
      (github.event.review.state == 'changes_requested' || github.event.review.state == 'commented')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      # Loop guard: count how many auto-fix rounds have already happened on this PR
      # by counting Claude's marker comments. Stop after 3.
      - name: Enforce 3-round cap
        id: cap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          ROUNDS=$(gh pr view "$PR" --json comments \
            --jq '[.comments[].body | select(contains("<!-- codex-loop-round -->"))] | length')
          echo "auto-fix rounds so far: $ROUNDS"
          if [ "$ROUNDS" -ge 3 ]; then
            echo "reached=1" >> "$GITHUB_OUTPUT"
          else
            echo "reached=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Announce the cap and pause
        if: steps.cap.outputs.reached == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR" --body "🛑 Reached the 3-round Codex⇄Claude auto-fix cap. Pausing automated fixes so a human can weigh in. Comment \`@claude\` to resume manually, or merge if it's ready."

      # Remember where the branch was before Claude ran, so the commit step can tell
      # whether anything advanced it (whether the action auto-commits or we do).
      - name: Record base SHA
        id: base
        if: steps.cap.outputs.reached == '0'
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # Codex's ACTIONABLE findings are inline review comments, not the review body
      # (which is just a generic header). Collect the inline comments attached to the
      # review that triggered this run into a file, outside the repo so it isn't committed.
      - name: Collect Codex findings
        id: findings
        if: steps.cap.outputs.reached == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REVIEW_ID: ${{ github.event.review.id }}
        run: |
          gh api --paginate "repos/${{ github.repository }}/pulls/$PR/comments" > "${{ runner.temp }}/comments.json"
          jq -r --arg rid "$REVIEW_ID" '
            ([ .[] | select((.pull_request_review_id|tostring) == $rid) ]) as $f
            | if ($f | length) == 0 then "NO_INLINE_FINDINGS"
              else ( $f[] | "## " + .path + " (line " + ((.line // .original_line // 0)|tostring) + ")\n\n" + .body + "\n" )
              end
          ' "${{ runner.temp }}/comments.json" > "${{ runner.temp }}/findings.md"
          echo "== collected findings =="
          cat "${{ runner.temp }}/findings.md"
          # Expose the findings text as a step output so the prompt can embed it inline
          # (Claude's file tools are sandboxed to the repo, so it cannot read runner.temp).
          {
            echo "text<<CODEX_FINDINGS_HEREDOC_EOF"
            cat "${{ runner.temp }}/findings.md"
            echo "CODEX_FINDINGS_HEREDOC_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Address the Codex feedback
        if: steps.cap.outputs.reached == '0'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Pass the built-in token so the action uses it directly for git/API and
          # never tries the OIDC token exchange (which needs id-token: write and was failing).
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # This loop is intentionally triggered by a bot (Codex). The action blocks
          # bot-initiated runs by default, so explicitly allow the Codex reviewer.
          allowed_bots: "chatgpt-codex-connector"
          # The edit tools ARE available, but the action denies writes unless we grant edit
          # permission non-interactively. Without this, Claude burns turns trying to edit and
          # every Edit/Write is refused ("you haven't granted it yet"), producing zero changes.
          claude_args: "--max-turns 40 --permission-mode acceptEdits"
          prompt: |
            OpenAI Codex reviewed this pull request and flagged the issues below. Each entry
            has a file path, a line number, and a description of the problem to fix.

            === CODEX FINDINGS ===
            ${{ steps.findings.outputs.text }}
            === END FINDINGS ===

            Edit the code in this repository to fix each finding:
            - Make minimal, correctly-scoped edits on the checked-out PR branch. No unrelated changes.
            - If a finding is genuinely wrong, already handled, or not worth doing, leave it and
              briefly explain why in your final message.
            - Do NOT run the full Gradle build or test suite — it is slow and CI already runs it.
            - Do NOT run git and do NOT post any PR comment. A later workflow step commits, pushes,
              and requests Codex's re-review. Your only job is to edit the source files correctly.
            - If the findings section is empty or says "NO_INLINE_FINDINGS", make no changes.

      # Diagnostic: dump what Claude actually did (tool calls, edited files, final message)
      # from the action's saved transcript, plus the workspace state, so we can see whether
      # Claude edited files (and where) or declined to change anything.
      - name: Debug — what did Claude do
        if: steps.cap.outputs.reached == '0'
        run: |
          F="${{ runner.temp }}/claude-execution-output.json"
          echo "== transcript file =="; ls -l "$F" || echo "MISSING"
          echo "== tool-use counts =="
          jq -r '[.. | objects | select(.type=="tool_use") | .name] | group_by(.) | map("\(length)x \(.[0])")[]' "$F" 2>/dev/null || echo "(could not parse)"
          echo "== files Claude edited/wrote =="
          jq -r '.. | objects | select(.type=="tool_use" and (.name=="Edit" or .name=="MultiEdit" or .name=="Write")) | (.input.file_path // .input.path)' "$F" 2>/dev/null | sort -u || true
          echo "== Claude final result text =="
          jq -r '.. | objects | select(.type=="result") | (.result // .subtype)' "$F" 2>/dev/null | tail -50 || true
          echo "== git status in workspace =="
          git -C "$GITHUB_WORKSPACE" status --porcelain || true
          echo "== .kt files modified in last 20 min anywhere under work dir =="
          find /home/runner/work -name '*.kt' -newermt '-20 minutes' 2>/dev/null | head -20 || true

      # Commit + push Claude's edits and ask Codex to re-review. Hardened to work whether
      # Claude's changes are left in the working tree (we commit them) OR the action already
      # committed them (we just push + detect the advance). Deterministic and logged.
      - name: Commit fixes, push, request re-review
        if: steps.cap.outputs.reached == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_SHA: ${{ steps.base.outputs.sha }}
        run: |
          git config user.name "claude-code-bot"
          git config user.email "claude-code-bot@users.noreply.github.com"
          echo "== git status (working tree) =="
          git status --porcelain
          # Commit any uncommitted edits Claude left behind.
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "fix: address Codex review findings"
          fi
          # Push whatever local commits exist that the remote doesn't have (no-op if none).
          git push origin "HEAD:${HEAD_REF}" || true
          # If the branch advanced (by our commit or the action's), request a re-review.
          if [ "$(git rev-parse HEAD)" != "$BASE_SHA" ]; then
            printf '@codex review\n\n<!-- codex-loop-round -->\n' | gh pr comment "$PR" --body-file -
            echo "pushed $(git rev-parse --short HEAD) and requested Codex re-review"
          else
            echo "Claude made no code changes — nothing to push; loop ends here."
          fi
