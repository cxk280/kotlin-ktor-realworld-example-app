name: Claude — address Codex review

# Two responsibilities:
#  1. When a PR opens, ask Codex to review it (Codex's own automatic reviews aren't
#     firing on this repo, so we request one explicitly with an `@codex review` comment).
#  2. When a review is submitted, have Claude fix the code, push, and request a
#     re-review — looping until Codex is satisfied or the 3-round cap is hit.
on:
  pull_request:
    types: [opened, reopened]
  pull_request_review:
    types: [submitted]

# If a newer review lands while Claude is still working, cancel the stale run.
concurrency:
  group: claude-codex-loop-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write        # commit & push fixes to the PR branch
  pull-requests: write   # comment on the PR
  issues: write
  id-token: write        # required: claude-code-action mints its GitHub token via OIDC

jobs:
  # ── Bootstrap: kick off the first Codex review when the PR opens ──────────────
  request-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Ask Codex to review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: gh pr comment "$PR" --repo "${{ github.repository }}" --body "@codex review"

  # ── Loop: address a submitted review, push a fix, ask for a re-review ─────────
  address-review:
    # Only act on real review events (never on Claude's own activity), and only on
    # reviews that say something (changes requested / commented — not a bare approval).
    if: >
      github.event_name == 'pull_request_review' &&
      github.event.review.user.login != 'claude[bot]' &&
      (github.event.review.state == 'changes_requested' || github.event.review.state == 'commented')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      # Loop guard: count how many auto-fix rounds have already happened on this PR
      # by counting Claude's marker comments. Stop after 3.
      - name: Enforce 3-round cap
        id: cap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          ROUNDS=$(gh pr view "$PR" --json comments \
            --jq '[.comments[].body | select(contains("<!-- codex-loop-round -->"))] | length')
          echo "auto-fix rounds so far: $ROUNDS"
          if [ "$ROUNDS" -ge 3 ]; then
            echo "reached=1" >> "$GITHUB_OUTPUT"
          else
            echo "reached=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Announce the cap and pause
        if: steps.cap.outputs.reached == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR" --body "🛑 Reached the 3-round Codex⇄Claude auto-fix cap. Pausing automated fixes so a human can weigh in. Comment \`@claude\` to resume manually, or merge if it's ready."

      # Codex's ACTIONABLE findings are inline review comments, not the review body
      # (which is just a generic header). Collect the inline comments attached to the
      # review that triggered this run into a file, outside the repo so it isn't committed.
      - name: Collect Codex findings
        if: steps.cap.outputs.reached == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REVIEW_ID: ${{ github.event.review.id }}
          OUT: ${{ runner.temp }}/CODEX_FINDINGS.md
        run: |
          gh api --paginate "repos/${{ github.repository }}/pulls/$PR/comments" > "${{ runner.temp }}/comments.json"
          jq -r --arg rid "$REVIEW_ID" '
            ([ .[] | select((.pull_request_review_id|tostring) == $rid) ]) as $f
            | if ($f | length) == 0 then "NO_INLINE_FINDINGS"
              else ( $f[] | "## " + .path + " (line " + ((.line // .original_line // 0)|tostring) + ")\n\n" + .body + "\n" )
              end
          ' "${{ runner.temp }}/comments.json" > "$OUT"
          echo "wrote findings to $OUT:"
          sed -n '1,40p' "$OUT"

      - name: Address the Codex feedback
        if: steps.cap.outputs.reached == '0'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Pass the built-in token so the action uses it directly for git/API and
          # never tries the OIDC token exchange (which needs id-token: write and was failing).
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # This loop is intentionally triggered by a bot (Codex). The action blocks
          # bot-initiated runs by default, so explicitly allow the Codex reviewer.
          allowed_bots: "chatgpt-codex-connector"
          claude_args: "--max-turns 40"
          prompt: |
            OpenAI Codex reviewed this pull request. Its specific, actionable findings —
            each with a file path, a line number, and a description — are in this file:

                ${{ runner.temp }}/CODEX_FINDINGS.md

            Read that file FIRST, then edit the code to fix each finding:
            - Make minimal, correctly-scoped edits on the checked-out PR branch. No unrelated changes.
            - If a finding is genuinely wrong, already handled, or not worth doing, leave it and
              briefly explain why in your final message.
            - Do NOT run the full Gradle build or test suite — it is slow and CI already runs it.
            - Do NOT run git and do NOT post any PR comment. A later workflow step commits, pushes,
              and requests Codex's re-review. Your only job is to edit the source files correctly.
            - CODEX_FINDINGS.md is outside the repo; do not modify or commit it.

      # Commit whatever Claude edited, push it, and ask Codex to re-review. Doing this in an
      # explicit step (rather than relying on the action) makes `git status` visible in the log
      # and deterministic: no changes → loop ends; changes → push + re-review request.
      - name: Commit fixes, push, request re-review
        if: steps.cap.outputs.reached == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "claude-code-bot"
          git config user.email "claude-code-bot@users.noreply.github.com"
          echo "== git status (what Claude changed) =="
          git status --porcelain
          if [ -z "$(git status --porcelain)" ]; then
            echo "Claude made no code changes — nothing to commit; loop ends here."
            exit 0
          fi
          git add -A
          git commit -m "fix: address Codex review findings"
          git push origin "HEAD:${HEAD_REF}"
          printf '@codex review\n\n<!-- codex-loop-round -->\n' | gh pr comment "$PR" --body-file -
          echo "committed, pushed, and requested Codex re-review"
